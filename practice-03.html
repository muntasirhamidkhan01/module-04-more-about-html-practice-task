    <main>
        <h2>Every kind of form element</h2>

        <hr>

        <h3>User Name</h3>
        <input type="text" name="user-name" id="user-name">

        <hr>

        <h3>Password</h3>
        <input type="password">

        <hr>

        <h3>Description</h3>
        <textarea name="description" id="description" rows="3" cols="20"></textarea>

        <hr>
    <form>
            <h3>Pick One</h3>

            <label for="bangla"><input type="radio" name="subject" id="bangla" checked>Bangla</label><br>

            <label for="english"><input type="radio" name="subject" id="english">English</label><br>
            
            <label for="math"><input type="radio" name="subject" id="math">Math</label><br>

            <hr>

            <h3>Pick Any</h3>

            <label for="choice-1"><input type="checkbox" name="choice" id="choice">Choice 1</label><br>

            <label for="choice-2"><input type="checkbox" name="choice" id="choice">Choice 2</label><br>

            <label for="choice-3"><input type="checkbox" name="choice" id="choice">Choice 3</label><br>

            <hr>

            <label for="need-a-drink">Need a drink?</label><br>
            <select name="need-a-drink" id="need-a-drink">
                <option value="tea">Tea</option>
                <option value="coffee">Coffee</option>
                <option value="cold-drinks">Cold Drinks</option>
            </select>
            
                <hr>

                    <label><input type="submit" id="submit-this-form" value="Submit this Form"></label><br>
                <!-- <button type="submit" id="submit-this-form">Submit this form</button> -->
        </form>
    </main>
